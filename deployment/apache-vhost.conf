<VirtualHost *:80>
    ServerName kwarta.local
    DocumentRoot "C:/path/to/Kwarta/frontend/public"

    <Directory "C:/path/to/Kwarta/frontend/public">
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog "logs/kwarta-error.log"
    CustomLog "logs/kwarta-access.log" common
</VirtualHost>
